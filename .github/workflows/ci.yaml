name: Cart Service CI

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: modi123/cart-service

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout cart repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Clone proto repo
      - name: Clone proto repo
        run: |
          git clone https://github.com/modi-guru/OTEL-PROTO.git
          mkdir pb
          cp OTEL-PROTO/demo.proto pb/

      # 3. Set dynamic tag
      - name: Set image tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # 4. Login to DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. Build & Push image
      - name: Build & Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.TAG }}

      #  Update Helm repo (FIXED CD PART)
      - name: Update Helm values (GitOps CD)
        env:
          TAG: ${{ env.TAG }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # clone with auth (IMPORTANT)
          git clone https://$GH_TOKEN@github.com/modi-guru/otel-observability-k8s-demo.git
          cd otel-observability-k8s-demo

          # install yq
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

          # 🔥 update ONLY cartservice tag
          yq -i '.cartservice.image.tag = env(TAG)' values.yaml

          # commit & push
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add values.yaml
          git commit -m "update cart image to $TAG" || echo "no changes"
          git push